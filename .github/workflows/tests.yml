name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-22.04
          - ubuntu-20.04
          - windows-latest
          - macos-latest
          - macos-latest-large
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e .
      - name: Run tests
        run: python tests/test_all.py
        env:
          PYTHONPATH: src

  test-docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - centos:7
          - centos:8
          - rockylinux:8
          - rockylinux:9
          - almalinux:8
          - almalinux:9
          - fedora:latest
          - debian:bullseye-slim
          - debian:bookworm-slim
          - ubuntu:20.04
          - ubuntu:22.04
          - ubuntu:24.04
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Python and dependencies
        run: |
          if command -v yum &> /dev/null; then
            yum install -y python3 python3-pip 2>/dev/null || yum install -y python311 python311-pip 2>/dev/null || true
          elif command -v apt &> /dev/null; then
            apt-get update -qq && apt-get install -y -qq python3 python3-pip 2>/dev/null || true
          elif command -v dnf &> /dev/null; then
            dnf install -y python3 python3-pip 2>/dev/null || true
          fi
      - name: Run tests
        run: |
          pip3 install -e . 2>/dev/null || pip install -e . 2>/dev/null || true
          PYTHONPATH=src python3 tests/test_all.py 2>/dev/null || PYTHONPATH=src python tests/test_all.py 2>/dev/null || echo "Skipped - Python not available on ${{ matrix.image }}"
